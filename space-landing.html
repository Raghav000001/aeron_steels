    // ─── FadingVideo Component ──────────────────────────────────────────────
    function FadingVideo({ src, className, style: externalStyle }) {
      const videoRef = useRef(null);
      const rAFIdRef = useRef(null);
      const fadingOutRef = useRef(null);
      const listenersRef = useRef([]);

      const fadeTo = useCallback((target, dur) => {
        const video = videoRef.current;
        if (!video) return;
        if (rAFIdRef.current) cancelAnimationFrame(rAFIdRef.current);

        const startOpacity = parseFloat(video.style.opacity) || 0;
        const diff = target - startOpacity;
        const startTime = performance.now();

        function animate(now) {
          const elapsed = now - startTime;
          const progress = Math.min(elapsed / dur, 1);
          video.style.opacity = startOpacity + diff * progress;
          if (progress < 1) {
            rAFIdRef.current = requestAnimationFrame(animate);
          }
        }
        rAFIdRef.current = requestAnimationFrame(animate);
      }, []);

      useEffect(() => {
        const video = videoRef.current;
        if (!video) return;

        const cleanupFns = [];

        function onLoadedData() {
          video.style.opacity = 0;
          video.play().catch(() => {});
          fadeTo(1, FADE_MS);
        }

        function onTimeUpdate() {
          if (fadingOutRef.current) return;
          const remain = video.duration - video.currentTime;
          if (remain > 0 && remain <= FADE_OUT_LEAD) {
            fadingOutRef.current = true;
            fadeTo(0, FADE_MS);
          }
        }

        function onEnded() {
          video.style.opacity = 0;
          setTimeout(() => {
            video.currentTime = 0;
            video.play().catch(() => {});
            fadingOutRef.current = null;
            fadeTo(1, FADE_MS);
          }, 100);
        }

        video.addEventListener('loadeddata', onLoadedData);
        video.addEventListener('timeupdate', onTimeUpdate);
        video.addEventListener('ended', onEnded);
        listenersRef.current = [onLoadedData, onTimeUpdate, onEnded];

        return () => {
          if (rAFIdRef.current) cancelAnimationFrame(rAFIdRef.current);
          video.removeEventListener('loadeddata', onLoadedData);
          video.removeEventListener('timeupdate', onTimeUpdate);
          video.removeEventListener('ended', onEnded);
        };
      }, [src, fadeTo]);

      return (
        <video
          ref={videoRef}
          src={src}
          className={`fading-video ${className || ''}`}
          style={{ ...externalStyle }}
          muted
          playsInline
          preload="auto"
        />
      );
    }

    // ─── BlurText Component ─────────────────────────────────────────────────
    function BlurText({ text, className }) {
      const [isVisible, setIsVisible] = useState(false);
      const ref = useRef(null);

      useEffect(() => {
        const el = ref.current;
        if (!el) return;
        const observer = new IntersectionObserver(
          ([entry]) => {
            if (entry.isIntersecting) {
              setIsVisible(true);
              observer.disconnect();
            }
          },
          { threshold: 0.1 }
        );
        observer.observe(el);
        return () => observer.disconnect();
      }, []);

      const words = text.split(' ');

      return (
        <p
          ref={ref}
          className={className}
          style={{ display: 'flex', flexWrap: 'wrap', justifyContent: 'center', rowGap: '0.1em' }}
        >
          {words.map((word, i) => (
            <motion.span
              key={i}
              initial={{ filter: 'blur(10px)', opacity: 0, y: 50 }}
              animate={
                isVisible
                  ? {
                      filter: ['blur(10px)', 'blur(5px)', 'blur(0px)'],
                      opacity: [0, 0.5, 1],
                      y: [50, -5, 0],
                    }
                  : {}
              }
              transition={{
                duration: 0.7,
                times: [0, 0.5, 1],
                ease: 'easeOut',
                delay: (i * 100) / 1000,
              }}
              style={{ display: 'inline-block', marginRight: '0.28em' }}
            >
              {word}
            </motion.span>
          ))}
        </p>
      );
    }
